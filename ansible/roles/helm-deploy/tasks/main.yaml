---
- name: Add ingress-nginx Helm repository
  ansible.builtin.shell: |
    helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
    helm repo update
  register: helm_repo_result
  changed_when: helm_repo_result.rc == 0
  failed_when: helm_repo_result.rc != 0
  become: true

- name: Deploy ingress-nginx with Helm
  ansible.builtin.shell: |
    helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx --version 4.14.5 --namespace default -f {{ working_dir | default('/home/main/Video-streaming-app') }}/k3s/helm/ingress-nginx-values.yaml --set controller.image.tag=v1.14.5 --set controller.image.digest=sha256:af3312d040dbe8d503001a1094b248e8be372f70f317a4bc35f81fb312bff3a8
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: helm_deploy_result
  changed_when: helm_deploy_result.rc == 0
  failed_when: helm_deploy_result.rc != 0
  become: true
