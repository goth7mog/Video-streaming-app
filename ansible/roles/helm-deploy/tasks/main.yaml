---
- name: Add ingress-nginx Helm repository
  ansible.builtin.shell: |
    helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
    helm repo update
  register: helm_repo_result
  changed_when: helm_repo_result.rc == 0
  failed_when: helm_repo_result.rc != 0
  become: true

- name: Deploy ingress-nginx with Helm
  ansible.builtin.shell: |
    helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx --version 4.15.1 --namespace default -f {{ working_dir | default('/home/main/Video-streaming-app') }}/k3s/helm/ingress-nginx-values.yaml --set controller.image.tag=v1.15.1 --set controller.image.digest=sha256:594ceea76b01c592858f803f9ff4d2cb40542cae2060410b2c95f75907d659e1
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: helm_deploy_result
  changed_when: helm_deploy_result.rc == 0
  failed_when: helm_deploy_result.rc != 0
  become: true
