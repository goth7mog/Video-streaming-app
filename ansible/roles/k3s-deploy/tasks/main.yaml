---
- name: Deploy ingress-nginx with Helm
  ansible.builtin.shell: |
    helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx --version 4.14.5 --namespace default -f {{ k3s_manifest_dir }}/helm/ingress-nginx-values.yaml --set controller.image.tag=v1.14.5 --set controller.image.digest=sha256:af3312d040dbe8d503001a1094b248e8be372f70f317a4bc35f81fb312bff3a8
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: helm_deploy_result
  changed_when: helm_deploy_result.rc == 0
  failed_when: helm_deploy_result.rc != 0
  become: true

- name: Wait for cert-manager deployments to be available
  ansible.builtin.shell: |
    kubectl wait -n cert-manager --for=condition=available deployment --all --timeout=180s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: cert_manager_ready
  changed_when: false
  until: cert_manager_ready.rc == 0
  retries: 5
  delay: 6
  become: true

- name: Wait for ingress-nginx controller to be available
  ansible.builtin.shell: |
    kubectl wait -n default --for=condition=available deployment/ingress-nginx-controller --timeout=180s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: ingress_nginx_ready
  changed_when: false
  until: ingress_nginx_ready.rc == 0
  retries: 5
  delay: 6
  become: true

- name: Check ingress-nginx bundled Nginx version
  ansible.builtin.shell: |
    set -euo pipefail
    kubectl exec -n default deploy/ingress-nginx-controller -- nginx -v 2>&1 | sed -n 's/^nginx version: nginx\///p'
  args:
    executable: /bin/bash
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: nginx_version_check
  changed_when: false
  failed_when: nginx_version_check.rc != 0
  become: true

- name: Output ingress-nginx Nginx version
  ansible.builtin.debug:
    msg: "ingress-nginx is running Nginx {{ nginx_version_check.stdout | trim }}"

- name: Warn when ingress-nginx Nginx is older than 1.30.0
  ansible.builtin.debug:
    msg: "WARNING: ingress-nginx is running Nginx {{ nginx_version_check.stdout | trim }}, which is older than 1.30.0"
  when:
    - nginx_version_check.stdout | trim != ""
    - nginx_version_check.stdout | trim is version('1.30.0', '<')

- name: Apply K3S manifests
  ansible.builtin.shell: |
    set -euo pipefail
    set -a
    . "{{ k3s_manifest_dir }}/variables.env"
    set +a

    envsubst < "{{ k3s_manifest_dir }}/letsencrypt-clusterissuer.yaml" | kubectl apply -f -
    envsubst < "{{ k3s_manifest_dir }}/app-certificate.yaml" | kubectl apply -f -
    envsubst < "{{ k3s_manifest_dir }}/app-ingress.yaml" | kubectl apply -f -
    envsubst < "{{ k3s_manifest_dir }}/nfs-pv-pvc.yaml" | kubectl apply -f -
    envsubst < "{{ k3s_manifest_dir }}/app-configmap.yaml" | kubectl apply -f -
    envsubst < "{{ k3s_manifest_dir }}/app-deployment.yaml" | kubectl apply -f -
    envsubst < "{{ k3s_manifest_dir }}/app-service.yaml" | kubectl apply -f -
  args:
    executable: /bin/bash
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: k3s_manifest_apply
  changed_when: k3s_manifest_apply.rc == 0
  failed_when: k3s_manifest_apply.rc != 0
  become: true
